# MediRouteX - Complete Microservices Stack
# Production Docker Compose Configuration
# Run: docker-compose up -d

version: '3.8'

services:
  # ============================================
  # DATABASES & CACHE
  # ============================================
  
  postgres:
    image: postgis/postgis:15-3.3
    container_name: mediroutex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mediroutex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediroutex-network

  redis:
    image: redis:7-alpine
    container_name: mediroutex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mediroutex-network

  # ============================================
  # BACKEND MICROSERVICES (Node.js)
  # ============================================

  emergency-service:
    build:
      context: ./backend/services/emergency-service
      dockerfile: Dockerfile
    container_name: mediroutex-emergency
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/mediroutex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-2024
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mediroutex-network

  ambulance-service:
    build:
      context: ./backend/services/ambulance-service
      dockerfile: Dockerfile
    container_name: mediroutex-ambulance
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5002
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/mediroutex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-2024
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mediroutex-network

  hospital-service:
    build:
      context: ./backend/services/hospital-service
      dockerfile: Dockerfile
    container_name: mediroutex-hospital
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5003
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/mediroutex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-2024
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mediroutex-network

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: mediroutex-auth
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5004
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/mediroutex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-2024
      JWT_ACCESS_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mediroutex-network

  routing-service:
    build:
      context: ./backend/services/routing-service
      dockerfile: Dockerfile
    container_name: mediroutex-routing
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5005
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/mediroutex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-2024
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mediroutex-network

  ml-service:
    build:
      context: ./backend/services/ml-service
      dockerfile: Dockerfile
    container_name: mediroutex-ml
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/mediroutex
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-2024
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "5006:5006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mediroutex-network

volumes:
  postgres_data:
  redis_data:
  ml_models:

networks:
  mediroutex-network:
    driver: bridge
